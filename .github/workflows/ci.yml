name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    name: Lint + Test (Android)
    runs-on: ubuntu-latest

    # Token secret Mapbox (scope DOWNLOADS:READ) requis pour résoudre le SDK depuis le dépôt
    # Maven privé lors de la compilation de :app. Défini en secret de dépôt GitHub.
    env:
      MAPBOX_DOWNLOADS_TOKEN: ${{ secrets.MAPBOX_DOWNLOADS_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      # Tant que le projet Android n'est pas scaffoldé (pas de gradlew), le CI passe sans rien faire.
      - name: Détecter le projet Gradle
        id: gradle
        run: echo "present=$([ -f gradlew ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      # google-services.json est non versionné (dépôt public). Le plugin google-services exige
      # sa présence à la compilation de :app : on le reconstitue depuis le secret base64 du dépôt.
      - name: Injecter google-services.json
        if: steps.gradle.outputs.present == 'true'
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > app/google-services.json

      - name: Set up JDK 17
        if: steps.gradle.outputs.present == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle (cache)
        if: steps.gradle.outputs.present == 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Lint (Android Lint + ktlint)
        if: steps.gradle.outputs.present == 'true'
        run: ./gradlew --no-daemon lintDebug ktlintCheck

      - name: Tests unitaires
        if: steps.gradle.outputs.present == 'true'
        run: ./gradlew --no-daemon testDebugUnitTest :core:test :domain:test :location:test
