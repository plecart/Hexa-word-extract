name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    name: Lint + Type-check + Test
    runs-on: ubuntu-latest

    # Décommenter pour un projet Django/Celery qui a besoin d'une base et d'un broker en CI.
    # services:
    #   postgres:
    #     image: postgres:16
    #     env: { POSTGRES_USER: app, POSTGRES_PASSWORD: app, POSTGRES_DB: app_test }
    #     ports: ["5432:5432"]
    #     options: >-
    #       --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 10
    #   redis:
    #     image: redis:7
    #     ports: ["6379:6379"]
    #     options: >-
    #       --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 5s --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Typecheck (mypy)
        run: uv run mypy .

      - name: Tests + coverage (pytest, seuil 80%)
        run: uv run pytest --cov --cov-report=term-missing --cov-fail-under=80
